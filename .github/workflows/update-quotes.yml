name: Update market quotes

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quote-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest quotes
        run: node scripts/update-quotes.mjs
      - name: Save changed quotes
        run: |
          if git diff --quiet -- app/quotes.generated.json; then
            echo "Quotes have not changed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/quotes.generated.json
          git commit -m "Update market quotes"
          git push
